name: run-tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3', '8.4', '8.5' ]
        dependency-version: [ prefer-stable ]

    name: PHP ${{ matrix.php }} - ${{ matrix.dependency-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: dependencies-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, iconv, json, libxml, mbstring, openssl, simplexml, xml, xmlwriter
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

      - name: Write Secret Test Invoices
        run: |
          if [ -n "$ENEL_INVOICE" ]; then
            mkdir -p tests/fixtures/private/
            printf '%s' "$ENEL_INVOICE" | base64 --decode > tests/fixtures/private/IT12345678910_0Efs6.xml.p7m 2>/dev/null || \
              printf '%s' "$ENEL_INVOICE" > tests/fixtures/private/IT12345678910_0Efs6.xml.p7m
          fi
        shell: bash
        env:
          ENEL_INVOICE : ${{secrets.ENEL_INVOICE}}

      - name: Execute tests
        run: composer test
